<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zizizaizai Topic Dashboard</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Vue 3 & ECharts -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>

    <style>
        :root {
            --bg-dark: #0b0f19;
            --bg-gradient-start: #0f172a;
            --bg-gradient-end: #020617;
            
            --glass-bg: rgba(30, 41, 59, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-hover: rgba(51, 65, 85, 0.6);
            --glass-active: rgba(56, 189, 248, 0.15);
            
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            
            --accent-color: #38bdf8;
            
            --danger: #ef4444;
            --success: #10b981;
            
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }
        
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.5;
        }
        .orb-1 { width: 400px; height: 400px; background: rgba(56, 189, 248, 0.15); top: -100px; left: -100px; }
        .orb-2 { width: 500px; height: 500px; background: rgba(139, 92, 246, 0.1); bottom: -150px; right: -100px; }

        #app {
            display: flex;
            width: 100%;
            height: 100%;
            padding: 24px;
            gap: 24px;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar { width: 350px; flex-shrink: 0; display: flex; flex-direction: column; }
        .sidebar-header { padding: 24px; border-bottom: 1px solid var(--glass-border); }
        .sidebar-header h1 { font-size: 20px; font-weight: 600; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
        .sidebar-header p { font-size: 13px; color: var(--text-secondary); }
        .search-box { margin-top: 16px; position: relative; }
        .search-box input { width: 100%; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--glass-border); border-radius: 8px; padding: 10px 14px; color: var(--text-primary); font-size: 14px; outline: none; transition: all 0.2s ease; }
        .search-box input:focus { border-color: var(--accent-color); box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2); }
        .topic-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

        .topic-item { padding: 14px 16px; border-radius: var(--radius-md); cursor: pointer; transition: all 0.2s ease; border: 1px solid transparent; display: flex; flex-direction: column; gap: 6px; }
        .topic-item:hover { background: var(--glass-hover); border-color: rgba(255, 255, 255, 0.05); }
        .topic-item.active { background: var(--glass-active); border-color: rgba(56, 189, 248, 0.3); box-shadow: 0 0 20px rgba(56, 189, 248, 0.1); }
        .topic-name-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
        .topic-name { font-size: 14px; font-weight: 500; line-height: 1.4; color: var(--text-primary); }
        .topic-item.active .topic-name { color: var(--accent-color); }
        .stock-badge { background: rgba(255, 255, 255, 0.1); color: var(--text-secondary); font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
        .topic-item.active .stock-badge { background: var(--accent-color); color: #000; }
        .topic-meta { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-muted); }
        .top-badge { color: #f59e0b; font-size: 11px; font-weight: 600; display: flex; align-items: center; gap: 4px; }

        .main-content { flex: 1; display: flex; flex-direction: column; }
        .main-header { padding: 32px 32px 24px; border-bottom: 1px solid var(--glass-border); flex-shrink: 0; }
        .main-title { font-size: 28px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; }
        .main-meta { display: flex; gap: 16px; font-size: 13px; color: var(--text-secondary); }
        .meta-item { display: flex; align-items: center; gap: 6px; }
        .meta-icon { opacity: 0.7; }
        .content-scroll-area { flex: 1; overflow-y: auto; padding: 0; }

        .topic-description { padding: 24px 32px; font-size: 14.5px; line-height: 1.7; color: #e2e8f0; background: rgba(0, 0, 0, 0.15); border-bottom: 1px solid var(--glass-border); }
        .topic-description p { margin-bottom: 12px; }
        .topic-description p:last-child { margin-bottom: 0; }
        .topic-description b, .topic-description strong { color: #fff; font-weight: 600; }

        .table-container { padding: 24px 32px; }
        .section-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .section-title span { background: rgba(255,255,255,0.1); padding: 2px 10px; border-radius: 12px; font-size: 13px; color: var(--text-secondary); }

        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid rgba(255, 255, 255, 0.06); }
        th { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; position: sticky; top: 0; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(8px); z-index: 10; }
        tbody tr { transition: background 0.2s; }
        tbody tr:hover { background: rgba(255, 255, 255, 0.03); }
        tbody tr:last-child td { border-bottom: none; }
        td { font-size: 14px; line-height: 1.5; }
        
        .col-category { width: 15%; color: var(--text-secondary); font-size: 13px; }
        .col-stock { width: 15%; font-weight: 600; color: #e2e8f0; }
        .col-relevance { width: 60%; color: var(--text-primary); }
        .col-source { width: 10%; color: var(--text-muted); font-size: 12px; }
        .source-tag { display: inline-block; background: rgba(255,255,255,0.08); padding: 3px 8px; border-radius: 4px; }

        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); text-align: center; }
        .empty-state svg { width: 64px; height: 64px; opacity: 0.2; margin-bottom: 16px; }
        .empty-state h2 { font-size: 20px; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; }

        .loader { border: 3px solid rgba(255,255,255,0.1); border-radius: 50%; border-top: 3px solid var(--accent-color); width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    
    <div id="app">
        <div v-if="loading" class="empty-state glass-panel" style="width: 100%;">
            <div class="loader"></div>
            <h2 style="margin-top: 20px;">Loading Topics Data...</h2>
            <p v-if="error" style="color: var(--danger); margin-top: 10px;">{{ error }}</p>
        </div>

        <template v-else>
            <!-- Sidebar -->
            <aside class="sidebar glass-panel">
                <div class="sidebar-header">
                    <h1>Zizizaizai Topics</h1>
                    <p>{{ topics.length }} total active themes</p>
                    <div class="search-box">
                        <input type="text" v-model="searchQuery" placeholder="Search topics or stocks...">
                    </div>
                </div>
                
                <div class="topic-list">
                    <div 
                        v-for="topic in filteredTopics" 
                        :key="topic.id" 
                        class="topic-item"
                        :class="{ active: selectedTopic && selectedTopic.id === topic.id }"
                        @click="selectTopic(topic)"
                    >
                        <div class="topic-name-row">
                            <span class="topic-name">{{ topic.name }}</span>
                            <span class="stock-badge">{{ topic.rows ? topic.rows.length : 0 }} stocks</span>
                        </div>
                        <div class="topic-meta">
                            <span>{{ formatDate(topic.updated_time) }}</span>
                            <span v-if="topic.is_top == 1" class="top-badge">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                                TOP
                            </span>
                        </div>
                    </div>
                    <div v-if="filteredTopics.length === 0" style="text-align: center; padding: 20px; color: var(--text-muted);">
                        No matching topics found.
                    </div>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="main-content glass-panel">
                <div v-if="!selectedTopic" class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" /></svg>
                    <h2>Select a topic to view details</h2>
                    <p>Choose a theme from the left sidebar to explore the investment logic and related stocks.</p>
                </div>

                <template v-else>
                    <div class="main-header">
                        <h2 class="main-title">{{ selectedTopic.name }}</h2>
                        <div class="main-meta">
                            <div class="meta-item">
                                <span class="meta-icon">ID:</span> {{ selectedTopic.id }}
                            </div>
                            <div class="meta-item">
                                <span class="meta-icon">Created:</span> {{ selectedTopic.created_time }}
                            </div>
                            <div class="meta-item" style="color: var(--accent-color);">
                                <span class="meta-icon">Updated:</span> {{ selectedTopic.updated_time }}
                            </div>
                        </div>
                    </div>
                    
                    <div class="content-scroll-area">
                        <!-- Description -->
                        <div class="topic-description" v-html="formatContent(selectedTopic.content)"></div>
                        
                        <!-- K-line Chart -->
                        <div class="table-container" style="border-bottom: 1px solid var(--glass-border); padding-bottom: 0;">
                            <h3 class="section-title">
                                题材 K线与活跃个股 (Market Trend & Active Stocks)
                            </h3>
                            <div id="kline-chart" style="width: 100%; height: 450px;"></div>
                        </div>

                        <!-- Leaderboard -->
                        <div class="table-container" style="border-bottom: 1px solid var(--glass-border); padding-bottom: 24px;" v-if="activeStocksLeaderboard.length > 0 || leaderboardDays > 0">
                            <div class="section-title" style="justify-content: space-between;">
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    历史活跃龙头榜 (Active Stocks Leaderboard)
                                    <span>按涨停次数降序 (Limit Up Count)</span>
                                    <span v-if="visibleDateRange" style="color: var(--accent-color); font-weight: normal; font-size: 13px; background: rgba(56, 189, 248, 0.1); padding: 2px 8px; border-radius: 6px;">{{ visibleDateRange }}</span>
                                </div>
                                <div style="display: flex; gap: 6px; align-items: center;">
                                    <input type="number" v-model.number="customDays" @change="applyCustomDays" placeholder="自定" style="width: 60px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 6px; padding: 4px 8px; color: var(--text-primary); font-size: 12px; outline: none;" min="1">
                                    <span style="font-size: 12px; color: var(--text-secondary); margin-right: 4px;">天</span>
                                    <button @click="setCustomDays(0)" style="background: rgba(255,255,255,0.1); color: var(--text-primary); border: none; padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all 0.2s;">全部</button>
                                    <button @click="setCustomDays(5)" style="background: rgba(255,255,255,0.1); color: var(--text-primary); border: none; padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all 0.2s;">近 5 天</button>
                                    <button @click="setCustomDays(10)" style="background: rgba(255,255,255,0.1); color: var(--text-primary); border: none; padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all 0.2s;">近 10 天</button>
                                    <button @click="setCustomDays(30)" style="background: rgba(255,255,255,0.1); color: var(--text-primary); border: none; padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all 0.2s;">近 30 天</button>
                                </div>
                            </div>
                            <div v-if="activeStocksLeaderboard.length === 0" style="padding: 20px; text-align: center; color: var(--text-muted); font-size: 13px;">
                                当前时间窗口内没有涨跌停活跃个股。
                            </div>
                            <div v-else style="display: flex; flex-wrap: wrap; gap: 10px;">
                                <div v-for="stock in activeStocksLeaderboard" :key="stock.name" 
                                     style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 8px 12px; display: flex; align-items: center; gap: 12px; transition: background 0.2s;"
                                     onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='rgba(255,255,255,0.05)'">
                                    <span style="font-weight: 600; color: #e2e8f0; font-size: 14px;">{{ stock.name }}</span>
                                    <div style="display: flex; gap: 6px; font-size: 12px; font-weight: 500;">
                                        <span v-if="stock.up > 0" style="color: #ef4444; background: rgba(239, 68, 68, 0.15); padding: 2px 6px; border-radius: 4px;">{{ stock.up }} 涨停</span>
                                        <span v-if="stock.down > 0" style="color: #10b981; background: rgba(16, 185, 129, 0.15); padding: 2px 6px; border-radius: 4px;">{{ stock.down }} 跌停</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Table -->
                        <div class="table-container">
                            <h3 class="section-title">
                                Related Stocks
                                <span>{{ selectedTopic.rows ? selectedTopic.rows.length : 0 }}</span>
                            </h3>
                            
                            <table v-if="selectedTopic.rows && selectedTopic.rows.length > 0">
                                <thead>
                                    <tr>
                                        <th class="col-category">Category</th>
                                        <th class="col-stock">Stock Name</th>
                                        <th class="col-relevance">Relevance / Logic</th>
                                        <th class="col-source">Source</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr v-for="(row, index) in selectedTopic.rows" :key="index">
                                        <td class="col-category">
                                            {{ row['一级大类'] }}
                                            <div v-if="row['二级小类']" style="font-size: 11px; opacity: 0.6; margin-top: 2px;">{{ row['二级小类'] }}</div>
                                        </td>
                                        <td class="col-stock">{{ row['个股'] }}</td>
                                        <td class="col-relevance">{{ row['相关性'] }}</td>
                                        <td class="col-source">
                                            <span class="source-tag" v-if="row['信息源']">{{ row['信息源'] }}</span>
                                            <span v-else>-</span>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                            <div v-else style="padding: 40px; text-align: center; color: var(--text-muted);">
                                No individual stocks mapped to this topic yet.
                            </div>
                        </div>
                    </div>
                </template>
            </main>
        </template>
    </div>

    <script>
        const { createApp, ref, shallowRef, computed, onMounted, watch, nextTick } = Vue;

        createApp({
            setup() {
                const topics = ref([]);
                const klines = ref({});
                const loading = ref(true);
                const error = ref(null);
                const searchQuery = ref('');
                const selectedTopic = ref(null);
                const leaderboardDays = ref(0);
                const customDays = ref(null);
                const visibleRange = ref({ start: 0, end: 99999 });
                let chartInstance = null;

                const loadData = async () => {
                    try {
                        const [topicRes, klineRes] = await Promise.all([
                            fetch('/data/cn_stock/hierarchical/signals/zizizaizai_topics.json'),
                            fetch('/data/cn_stock/hierarchical/signals/zizizaizai_klines.json').catch(() => null)
                        ]);
                        
                        if (!topicRes.ok) throw new Error(`HTTP error! status: ${topicRes.status}`);
                        
                        const data = await topicRes.json();
                        if (klineRes && klineRes.ok) {
                            klines.value = await klineRes.json();
                        }
                        
                        topics.value = data.sort((a, b) => {
                            if (a.is_top !== b.is_top) return (b.is_top || 0) - (a.is_top || 0);
                            return new Date(b.updated_time) - new Date(a.updated_time);
                        });
                        
                        if (topics.value.length > 0) {
                            selectedTopic.value = topics.value[0];
                        }
                    } catch (e) {
                        error.value = "Failed to load data. Ensure JSON files exist.";
                        console.error(e);
                    } finally {
                        loading.value = false;
                    }
                };

                onMounted(() => {
                    loadData();
                    window.addEventListener('resize', () => {
                        if (chartInstance) chartInstance.resize();
                    });
                });

                const filteredTopics = computed(() => {
                    if (!searchQuery.value) return topics.value;
                    const query = searchQuery.value.toLowerCase();
                    return topics.value.filter(t => {
                        if (t.name.toLowerCase().includes(query)) return true;
                        if (t.rows && Array.isArray(t.rows)) {
                            return t.rows.some(row => 
                                (row['个股'] && row['个股'].toLowerCase().includes(query)) ||
                                (row['一级大类'] && row['一级大类'].toLowerCase().includes(query))
                            );
                        }
                        return false;
                    });
                });

                const renderChart = () => {
                    if (!selectedTopic.value || !klines.value) return;
                    const tid = selectedTopic.value.id;
                    const kdata = klines.value[tid];
                    
                    const chartDom = document.getElementById('kline-chart');
                    if (!chartDom) return;
                    
                    if (!chartInstance) {
                        chartInstance = echarts.init(chartDom);
                    }
                    
                    if (!kdata || kdata.length === 0) {
                        chartInstance.clear();
                        chartInstance.setOption({
                            title: { text: 'No K-Line data available', textStyle: { color: '#64748b', fontSize: 14 }, left: 'center', top: 'center' }
                        });
                        return;
                    }
                    
                    chartInstance.clear();

                    const dates = kdata.map(d => d.trade_date);
                    const values = kdata.map(d => [d.open, d.close, d.low, d.high]);
                    
                    // Build Scatter data for annotations (Limit Up / Down)
                    // Instead of markPoints which might overlap terribly, we use scatter plots with labels above/below candles.
                    const upScatterData = [];
                    const downScatterData = [];
                    const gt5ScatterData = [];

                    kdata.forEach((d, idx) => {
                        try {
                            // Extract up limits
                            let ups = JSON.parse(d.up_limit_stocks || "[]");
                            let upText = ups.map(u => `[${u.time}] ${u.name}`).join('\n');
                            if (upText) {
                                upScatterData.push({
                                    value: [idx, d.high, upText],
                                    symbolOffset: [0, -15] // move above the wick
                                });
                            }
                            
                            // Extract down limits
                            let downs = JSON.parse(d.down_limit_stocks || "[]");
                            let downText = downs.map(u => `[${u.time}] ${u.name}`).join('\n');
                            if (downText) {
                                downScatterData.push({
                                    value: [idx, d.low, downText],
                                    symbolOffset: [0, 15] // move below the wick
                                });
                            }
                        } catch(e) {}
                    });

                    const option = {
                        backgroundColor: 'transparent',
                        tooltip: { 
                            trigger: 'axis',
                            axisPointer: { type: 'cross' }
                        },
                        legend: {
                            show: true,
                            data: [
                                { name: 'Topic Index (题材指数)' },
                                { name: 'Limit Up (涨停)', itemStyle: { color: '#ef4444' } },
                                { name: 'Limit Down (跌停)', itemStyle: { color: '#10b981' } }
                            ],
                            textStyle: { color: '#94a3b8' },
                            top: 0
                        },
                        grid: { left: '3%', right: '3%', bottom: '15%', top: '10%', containLabel: true },
                        xAxis: { type: 'category', data: dates, axisLine: { lineStyle: { color: '#334155' } }, axisLabel: { color: '#64748b' } },
                        yAxis: { 
                            type: 'value', 
                            scale: true, 
                            splitLine: { lineStyle: { color: 'rgba(255,255,255,0.05)' } }, 
                            axisLabel: { color: '#64748b' },
                            max: function (value) { return value.max + (value.max - value.min) * 0.2; },
                            min: function (value) { return value.min - (value.max - value.min) * 0.2; }
                        },
                        dataZoom: [{ type: 'inside', start: 60, end: 100 }, { type: 'slider', show: true, bottom: 0, textStyle: { color: '#64748b' } }],
                        series: [
                            {
                                name: 'Topic Index (题材指数)',
                                type: 'candlestick',
                                data: values,
                                itemStyle: {
                                    color: '#ef4444',
                                    color0: '#10b981',
                                    borderColor: '#ef4444',
                                    borderColor0: '#10b981'
                                }
                            },
                            {
                                name: 'Limit Up (涨停)',
                                type: 'scatter',
                                symbol: 'circle',
                                symbolSize: 0,
                                data: upScatterData,
                                label: {
                                    show: true,
                                    position: 'top',
                                    formatter: function(p) { return p.value[2]; },
                                    color: '#fff',
                                    backgroundColor: 'rgba(239, 68, 68, 0.8)', // Red bg
                                    padding: [2, 4],
                                    borderRadius: 3,
                                    fontSize: 10,
                                    lineHeight: 14
                                },
                                z: 10
                            },
                            {
                                name: 'Limit Down (跌停)',
                                type: 'scatter',
                                symbol: 'circle',
                                symbolSize: 0,
                                data: downScatterData,
                                label: {
                                    show: true,
                                    position: 'bottom',
                                    formatter: function(p) { return p.value[2]; },
                                    color: '#fff',
                                    backgroundColor: 'rgba(16, 185, 129, 0.8)', // Green bg
                                    padding: [2, 4],
                                    borderRadius: 3,
                                    fontSize: 10,
                                    lineHeight: 14
                                },
                                z: 10
                            }
                        ]
                    };
                    
                    chartInstance.setOption(option, true);
                    
                    // Sync visibleRange initially
                    const currentOption = chartInstance.getOption();
                    if (currentOption.dataZoom && currentOption.dataZoom[0]) {
                        const start = currentOption.dataZoom[0].startValue;
                        const end = currentOption.dataZoom[0].endValue;
                        visibleRange.value = {
                            start: start !== undefined ? start : 0,
                            end: end !== undefined ? end : kdata.length - 1
                        };
                    } else {
                        visibleRange.value = { start: 0, end: kdata.length - 1 };
                    }

                    // Listen to dataZoom events to sync the leaderboard
                    chartInstance.off('datazoom');
                    chartInstance.on('datazoom', () => {
                        const opt = chartInstance.getOption();
                        if (opt.dataZoom && opt.dataZoom[0]) {
                            const start = opt.dataZoom[0].startValue;
                            const end = opt.dataZoom[0].endValue;
                            visibleRange.value = {
                                start: start !== undefined ? start : 0,
                                end: end !== undefined ? end : kdata.length - 1
                            };
                        }
                    });
                };

                const setCustomDays = (days) => {
                    customDays.value = days > 0 ? days : null;
                    applyCustomDays();
                };

                const applyCustomDays = () => {
                    if (!selectedTopic.value || !klines.value) return;
                    const tid = selectedTopic.value.id;
                    const kdata = klines.value[tid];
                    if (!kdata || !chartInstance) return;

                    const days = customDays.value || 0;
                    let startIdx = 0;
                    if (days > 0) {
                        startIdx = Math.max(0, kdata.length - days);
                    }

                    chartInstance.dispatchAction({
                        type: 'dataZoom',
                        startValue: startIdx,
                        endValue: kdata.length - 1
                    });
                };

                watch(selectedTopic, () => {
                    nextTick(() => {
                        renderChart();
                    });
                });

                const selectTopic = (topic) => {
                    selectedTopic.value = topic;
                };

                const activeStocksLeaderboard = computed(() => {
                    if (!selectedTopic.value || !klines.value) return [];
                    const tid = selectedTopic.value.id;
                    let kdata = klines.value[tid];
                    if (!kdata) return [];
                    
                    if (visibleRange.value) {
                        const start = Math.max(0, visibleRange.value.start);
                        const end = Math.min(kdata.length - 1, visibleRange.value.end);
                        kdata = kdata.slice(start, end + 1);
                    }
                    
                    const counts = {};
                    kdata.forEach(d => {
                        try {
                            const ups = JSON.parse(d.up_limit_stocks || "[]");
                            ups.forEach(u => {
                                if (!counts[u.name]) counts[u.name] = { name: u.name, code: u.code, up: 0, down: 0 };
                                counts[u.name].up += 1;
                            });
                            const downs = JSON.parse(d.down_limit_stocks || "[]");
                            downs.forEach(u => {
                                if (!counts[u.name]) counts[u.name] = { name: u.name, code: u.code, up: 0, down: 0 };
                                counts[u.name].down += 1;
                            });
                        } catch(e) {}
                    });
                    
                    const list = Object.values(counts);
                    list.sort((a, b) => b.up - a.up); // sort by limit up frequency descending
                    
                    return list.filter(item => item.up > 0 || item.down > 0);
                });

                const visibleDateRange = computed(() => {
                    if (!selectedTopic.value || !klines.value || !visibleRange.value) return '';
                    const tid = selectedTopic.value.id;
                    const kdata = klines.value[tid];
                    if (!kdata || kdata.length === 0) return '';
                    
                    const startIdx = Math.max(0, visibleRange.value.start);
                    const endIdx = Math.min(kdata.length - 1, visibleRange.value.end);
                    
                    const startDate = kdata[startIdx]?.trade_date;
                    const endDate = kdata[endIdx]?.trade_date;
                    
                    if (startDate && endDate) {
                        return `${formatDate(startDate)} 至 ${formatDate(endDate)}`;
                    }
                    return '';
                });

                const formatDate = (dateStr) => {
                    if (!dateStr) return '';
                    try {
                        return dateStr.split(' ')[0].substring(5);
                    } catch (e) {
                        return dateStr;
                    }
                };

                const formatContent = (text) => {
                    if (!text) return '';
                    return text.split('\n')
                               .filter(line => line.trim() !== '')
                               .map(line => {
                                   line = line.replace(/^(\d+[、\.])(.*)/, '<strong>$1</strong> $2');
                                   line = line.replace(/(\d{4}年\d{1,2}月\d{1,2}日)/g, '<strong>$1</strong>');
                                   return `<p>${line}</p>`;
                               })
                               .join('');
                };

                return {
                    topics,
                    loading,
                    error,
                    searchQuery,
                    selectedTopic,
                    leaderboardDays,
                    customDays,
                    visibleRange,
                    setCustomDays,
                    applyCustomDays,
                    filteredTopics,
                    selectTopic,
                    activeStocksLeaderboard,
                    visibleDateRange,
                    formatDate,
                    formatContent
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
